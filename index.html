<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Box Duel: Balanced Speed & Rectangular Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --gta-orange: #ff7300;
      --wasted-red: #d90429;
      --hud-dark: rgba(10, 12, 24, 0.95);
      --neon-cyan: #00f3ff;
      --gas-green: #38b000;
      --rev-red: #ef4444;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background-color: #06070c; font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none; touch-action: none; color: #fff;
    }

    #simulationCanvas { display: none; width: 100%; height: 100%; }

    /* 🔌 ROOM AND ROLE JOIN OVERLAY SETUP PANEL */
    #lobby-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #090b14 0%, #030408 100%);
      z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 20px; box-sizing: border-box;
    }

    .lobby-box {
      background: var(--hud-dark); border: 2px solid var(--gta-orange);
      padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 115, 0, 0.2);
      max-width: 400px; width: 100%; text-align: center;
    }

    h2 { margin-top: 0; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase; }
    input {
      width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--neon-cyan);
      background: #111424; color: #fff; font-size: 16px; font-weight: bold; text-align: center; box-sizing: border-box;
    }

    .action-btn {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; border: none; text-transform: uppercase; background: var(--gta-orange); color: #fff;
    }
    .action-btn.secondary { background: #1e293b; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }

    .role-grid { display: flex; gap: 15px; margin-top: 20px; display: none; }
    .role-card {
      flex: 1; padding: 20px; border: 2px solid #334155; border-radius: 12px; cursor: pointer;
      font-weight: bold; text-transform: uppercase; background: #0f172a;
    }
    .role-card.selected-car { border-color: var(--gta-orange); color: var(--gta-orange); box-shadow: 0 0 15px rgba(255,115,0,0.3); }
    .role-card.selected-police { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0,243,255,0.3); }

    /* 📊 HUD METRICS PANEL */
    #dashboard-hud {
      position: absolute; top: 15px; left: 15px; right: 15px;
      z-index: 10; pointer-events: none; display: none; justify-content: space-between;
    }

    .hud-card {
      background: var(--hud-dark); border: 1px solid var(--gta-orange);
      padding: 10px 16px; border-radius: 12px; color: #ffffff;
    }

    .hud-tag { font-size: 10px; color: #94a3b8; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }
    .speed-value-string { font-size: 22px; font-weight: 900; color: var(--neon-cyan); font-family: monospace; }
    
    .linear-gauge { width: 130px; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 5px; }
    #hp-bar-node { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff5500); }

    /* 🕹️ CONTROLS GROUP POSITION INTERFACES */
    .controls-container { display: none; }
    .steering-side-deck { position: absolute; bottom: 35px; left: 20px; z-index: 15; display: flex; gap: 12px; align-items: center; }
    .combat-action-deck { position: absolute; bottom: 35px; right: 20px; z-index: 15; display: flex; gap: 20px; align-items: flex-end; }

    .hud-touch-node {
      width: 72px; height: 72px; background: var(--hud-dark); border: 2px solid var(--gta-orange);
      border-radius: 18px; color: #ffffff; font-size: 24px; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    
    #btn-reverse-pedal {
      width: 68px; height: 68px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--rev-red); border-radius: 18px; color: var(--rev-red);
      font-size: 15px; font-weight: bold; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
    }

    #btn-gas-pedal {
      width: 85px; height: 120px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border: 3px solid var(--gas-green); border-radius: 14px; color: var(--gas-green); font-size: 20px; font-weight: 900;
    }

    .hud-touch-node:active { transform: scale(0.9); background: var(--gta-orange); }
    #btn-gas-pedal:active { background: var(--gas-green); color: #fff; }
    #btn-reverse-pedal:active { background: var(--rev-red); color: #fff; box-shadow: 0 0 15px var(--rev-red); }

    /* 🛑 OVERLAYS SCREENS DESIGN DECK */
    #wasted-screen-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(8, 5, 5, 0.94); z-index: 150; display: none;
      flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px);
    }

    .wasted-banner { font-size: 54px; font-weight: 900; color: var(--wasted-red); letter-spacing: 8px; text-shadow: 0 0 25px red; }
    .status-text { margin-top: 10px; color: #94a3b8; font-size: 16px; letter-spacing: 1px; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="lobby-panel">
    <div class="lobby-box">
      <h2>Cyber Box Duel</h2>
      <div id="connection-controls">
        <button class="action-btn" onclick="initiateHostingRoom()">Create Room ID</button>
        <input type="text" id="room-id-input" placeholder="Enter Room ID Here...">
        <button class="action-btn secondary" onclick="joinTargetRoom()">Connect Room</button>
      </div>
      <div id="status-display" style="margin-top: 10px; font-size: 14px; color: #94a3b8;">Waiting for action...</div>

      <div class="role-grid" id="role-selection-deck">
        <div class="role-card" id="card-civilian" onclick="selectAssignedRole('car')">Civilian Car<br><span style="font-size:11px;color:#ff7300;">(Orange)</span></div>
        <div class="role-card" id="card-police" onclick="selectAssignedRole('police')">Interceptor<br><span style="font-size:11px;color:#00f3ff;">(Police)</span></div>
      </div>
      <button class="action-btn" id="start-match-btn" style="display:none; margin-top:20px;" onclick="triggerMatchLaunch()">Launch Arena Duel</button>
    </div>
  </div>

  <canvas id="simulationCanvas"></canvas>

  <div id="dashboard-hud">
    <div class="hud-card">
      <div class="hud-tag">SPEED LOGISTICS</div>
      <div class="speed-value-string" id="speed-indicator">0 KM/H</div>
    </div>
    
    <div class="hud-card" style="text-align:center;">
      <div class="hud-tag">GEAR</div>
      <div class="speed-value-string" id="gear-indicator">N</div>
    </div>

    <div class="hud-card" style="text-align: right;">
      <div class="hud-tag">CAR PROTECTION HP</div>
      <div class="linear-gauge"><div id="hp-bar-node"></div></div>
    </div>
  </div>

  <div class="controls-container" id="hardware-joysticks">
    <div class="steering-side-deck">
      <div class="hud-touch-node" id="btn-turn-left">◀</div>
      <div class="hud-touch-node" id="btn-turn-right">▶</div>
      <div class="hud-touch-node" id="btn-reverse-pedal">REV</div>
    </div>
    <div class="combat-action-deck">
      <div class="hud-touch-node" id="btn-gas-pedal">GAS</div>
    </div>
  </div>

  <div id="wasted-screen-overlay">
    <div class="wasted-banner" id="end-title">OUT / WASTED</div>
    <div class="status-text" id="end-subtitle">Chassis Integrity Collapsed</div>
    <button class="action-btn" style="width:200px; margin-top:20px;" onclick="location.reload()">Rematch Duel</button>
  </div>

  <script>
    const canvas = document.getElementById('simulationCanvas');
    const ctx = canvas.getContext('2d');

    let currentRole = null; 
    let peerConnection = null;
    let dataChannelConnection = null;
    let matchStarted = false;

    // RECTANGULAR BOX ARENA SIZE DEFINITIONS
    const ARENA_WIDTH = 1000000;
    const ARENA_HEIGHT = 1000000;

    let localPlayer = { worldX: -200, worldY: 0, headingAngle: -Math.PI/2, speed: 0, steering: 0, gas: false, reverse: false, hp: 100, width: 38, height: 74 };
    let remotePlayer = { worldX: 200, worldY: 0, headingAngle: -Math.PI/2, speed: 0, width: 38, height: 74, hp: 100 };
    
    let cameraViewTranslate = { x: 0, y: 0 };
    let impactCrashSparks = [];
    let explosionBlastsPool = [];
    let globalFrameClock = 0;

    function updateLobbyStatus(msg, color="#94a3b8") {
      const node = document.getElementById('status-display');
      node.innerText = msg; node.style.color = color;
    }

    function initiateHostingRoom() {
      const generatedID = Math.floor(1000 + Math.random() * 9000).toString();
      document.getElementById('room-id-input').value = generatedID;
      updateLobbyStatus("Creating signaling cluster on cloud node...");

      peerConnection = new Peer(generatedID);
      peerConnection.on('open', (id) => {
        updateLobbyStatus(`Room Created! Share ID: ${id} with your friend`, "#38b000");
      });

      peerConnection.on('connection', (conn) => {
        dataChannelConnection = conn;
        configureNetworkChannelHooks();
      });
    }

    function joinTargetRoom() {
      const targetedRoomID = document.getElementById('room-id-input').value.trim();
      if(!targetedRoomID) return updateLobbyStatus("Please enter a valid room ID!", "red");
      
      updateLobbyStatus("Connecting peer tunneling channels...");
      peerConnection = new Peer();
      
      peerConnection.on('open', () => {
        dataChannelConnection = peerConnection.connect(targetedRoomID);
        configureNetworkChannelHooks();
      });
    }

    function configureNetworkChannelHooks() {
      dataChannelConnection.on('open', () => {
        updateLobbyStatus("Tunnel Verified! Choose Roles below:", "#00f3ff");
        document.getElementById('connection-controls').style.display = 'none';
        document.getElementById('role-selection-deck').style.display = 'flex';
      });

      dataChannelConnection.on('data', (payload) => {
        if(payload.type === 'role-sync') {
          if(payload.role === 'car') { adjustUIForLockedRole('police'); } else { adjustUIForLockedRole('car'); }
        }
        if(payload.type === 'launch-game') { launchArenaDuelSimulation(); }
        if(payload.type === 'sync-coords') {
          remotePlayer.worldX = payload.x;
          remotePlayer.worldY = payload.y;
          remotePlayer.headingAngle = payload.angle;
          remotePlayer.speed = payload.speed;
          remotePlayer.hp = payload.hp;
        }
        if(payload.type === 'boom') { triggerBoomExplosionRing(payload.x, payload.y); }
        if(payload.type === 'wasted') { triggerMatchTerminationUI(payload.winner); }
      });
    }

    function selectAssignedRole(role) {
      currentRole = role;
      document.getElementById('card-civilian').className = "role-card " + (role === 'car' ? 'selected-car' : '');
      document.getElementById('card-police').className = "role-card " + (role === 'police' ? 'selected-police' : '');
      
      dataChannelConnection.send({ type: 'role-sync', role: role });
      document.getElementById('start-match-btn').style.display = 'block';
    }

    function adjustUIForLockedRole(autoRole) {
      currentRole = autoRole;
      document.getElementById('card-civilian').className = "role-card " + (autoRole === 'car' ? 'selected-car' : '');
      document.getElementById('card-police').className = "role-card " + (autoRole === 'police' ? 'selected-police' : '');
      document.getElementById('start-match-btn').style.display = 'block';
    }

    function triggerMatchLaunch() {
      dataChannelConnection.send({ type: 'launch-game' });
      launchArenaDuelSimulation();
    }

    function launchArenaDuelSimulation() {
      document.getElementById('lobby-panel').style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('dashboard-hud').style.display = 'flex';
      document.getElementById('hardware-joysticks').style.display = 'block';
      
      if(currentRole === 'car') {
        localPlayer.worldX = -250; localPlayer.worldY = 0; localPlayer.width = 38; localPlayer.height = 74;
        remotePlayer.width = 40; remotePlayer.height = 76;
      } else {
        localPlayer.worldX = 250; localPlayer.worldY = 0; localPlayer.width = 40; localPlayer.height = 76;
        remotePlayer.width = 38; remotePlayer.height = 74;
      }
      
      matchStarted = true;
      resizeViewportCanvas();
      registerHardwareGamepadInterfaces();
      requestAnimationFrame(executeRenderingLoopPipeline);
    }

    function registerHardwareGamepadInterfaces() {
      const left = document.getElementById('btn-turn-left');
      const right = document.getElementById('btn-turn-right');
      const gas = document.getElementById('btn-gas-pedal');
      const rev = document.getElementById('btn-reverse-pedal');

      left.addEventListener('touchstart', (e) => { e.preventDefault(); localPlayer.steering = -0.055; }, { passive: false });
      left.addEventListener('touchend', (e) => { e.preventDefault(); localPlayer.steering = 0; }, { passive: false });
      right.addEventListener('touchstart', (e) => { e.preventDefault(); localPlayer.steering = 0.055; }, { passive: false });
      right.addEventListener('touchend', (e) => { e.preventDefault(); localPlayer.steering = 0; }, { passive: false });
      
      gas.addEventListener('touchstart', (e) => { e.preventDefault(); localPlayer.gas = true; }, { passive: false });
      gas.addEventListener('touchend', (e) => { e.preventDefault(); localPlayer.gas = false; }, { passive: false });

      rev.addEventListener('touchstart', (e) => { e.preventDefault(); localPlayer.reverse = true; }, { passive: false });
      rev.addEventListener('touchend', (e) => { e.preventDefault(); localPlayer.reverse = false; }, { passive: false });

      window.addEventListener('resize', resizeViewportCanvas);
    }

    function resizeViewportCanvas() {
      if(!matchStarted) return;
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    }

    function generateImpactSparksCloud(worldX, worldY, isExplosion=false) {
      let count = isExplosion ? 45 : 15;
      for(let k = 0; k < count; k++) {
        impactCrashSparks.push({
          x: worldX, y: worldY,
          velX: (Math.random() - 0.5) * (isExplosion ? 20 : 12),
          velY: (Math.random() - 0.5) * (isExplosion ? 20 : 12),
          alpha: 1.0, color: isExplosion ? `rgb(255, ${Math.floor(Math.random()*120)}, 0)` : "#ff7300"
        });
      }
    }

    function triggerBoomExplosionRing(worldX, worldY) {
      explosionBlastsPool.push({ x: worldX, y: worldY, radius: 10, maxRadius: 80, alpha: 1.0 });
      generateImpactSparksCloud(worldX, worldY, true);
    }

    function triggerMatchTerminationUI(winner) {
      matchStarted = false;
      document.getElementById('wasted-screen-overlay').style.display = 'flex';
      if(winner === 'police') {
        document.getElementById('end-title').innerText = "POLICE WON";
        document.getElementById('end-title').style.color = "var(--neon-cyan)";
        document.getElementById('end-subtitle').innerText = "Civilian Target Intercepted and Wasted!";
      } else {
        document.getElementById('end-title').innerText = "CIVILIAN WON";
        document.getElementById('end-title').style.color = "var(--gta-orange)";
        document.getElementById('end-subtitle').innerText = "Police Core Engine Overload Failure!";
      }
    }

    function executeRenderingLoopPipeline() {
      if(!matchStarted) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      globalFrameClock++;

      // 🏎️ ACCELERATION AND REVERSE PHYSICS MATRIX (BALANCED MAX SPEED)
      let topSpeedNode = 12.0; 
      let reverseMaxSpeed = -5.0; 
      let accelNode = 0.09;
      let friction = 0.06;

      if(localPlayer.gas) {
        if(localPlayer.speed < topSpeedNode) localPlayer.speed += accelNode;
      } else if(localPlayer.reverse) {
        if(localPlayer.speed > reverseMaxSpeed) localPlayer.speed -= accelNode;
      } else {
        if(localPlayer.speed > 0) localPlayer.speed -= friction;
        if(localPlayer.speed < 0) localPlayer.speed += friction;
        if(Math.abs(localPlayer.speed) < friction) localPlayer.speed = 0;
      }

      if(localPlayer.steering !== 0 && Math.abs(localPlayer.speed) > 0.3) {
        let directionFactor = localPlayer.speed > 0 ? 1 : -1;
        localPlayer.headingAngle += localPlayer.steering * (Math.abs(localPlayer.speed) * 0.4) * directionFactor;
      }

      localPlayer.worldX += Math.cos(localPlayer.headingAngle) * localPlayer.speed;
      localPlayer.worldY += Math.sin(localPlayer.headingAngle) * localPlayer.speed;

      // Open world mode - no arena boundaries

      // SYNC NETWORK DATA PACKETS
      dataChannelConnection.send({
        type: 'sync-coords',
        x: localPlayer.worldX, y: localPlayer.worldY,
        angle: localPlayer.headingAngle, speed: localPlayer.speed, hp: localPlayer.hp
      });

      cameraViewTranslate.x = canvas.width / 2 - localPlayer.worldX;
      cameraViewTranslate.y = canvas.height / 2 - localPlayer.worldY;

      // DRAW ARENA FIELD SCENERY
      ctx.fillStyle = "#07080f"; ctx.fillRect(0, 0, canvas.width, canvas.height);

      // DRAW RECTANGULAR GRID CYBER BOX BOUNDARY WALLS
      ctx.strokeStyle = "rgba(0, 243, 255, 0.4)"; ctx.lineWidth = 6;
      ctx.shadowBlur = 25; ctx.shadowColor = "#00f3ff";
      ctx.strokeRect(-halfW + cameraViewTranslate.x, -halfH + cameraViewTranslate.y, ARENA_WIDTH, ARENA_HEIGHT);
      ctx.shadowBlur = 0; 

      // INNER ROAD ARCHITECTURE GRID MATRIX
      ctx.strokeStyle = "rgba(255,255,255,0.015)"; ctx.lineWidth = 1;
      for(let x = -halfW; x < halfW; x += 60) {
        ctx.beginPath(); ctx.moveTo(x + cameraViewTranslate.x, -halfH + cameraViewTranslate.y); ctx.lineTo(x + cameraViewTranslate.x, halfH + cameraViewTranslate.y); ctx.stroke();
      }

      // COLLISION DAMAGE PROCESSING
      if(currentRole === 'car') {
        let dx = localPlayer.worldX - remotePlayer.worldX;
        let dy = localPlayer.worldY - remotePlayer.worldY;
        let distanceBetweenPlayers = Math.hypot(dx, dy);

        if(distanceBetweenPlayers < 38) {
          localPlayer.hp -= 20; 
          if(localPlayer.hp < 0) localPlayer.hp = 0;

          triggerBoomExplosionRing(localPlayer.worldX, localPlayer.worldY);
          dataChannelConnection.send({ type: 'boom', x: localPlayer.worldX, y: localPlayer.worldY });

          localPlayer.worldX += Math.cos(localPlayer.headingAngle) * -45;
          localPlayer.worldY += Math.sin(localPlayer.headingAngle) * -45;

          if(localPlayer.hp <= 0) {
            triggerMatchTerminationUI('police');
            dataChannelConnection.send({ type: 'wasted', winner: 'police' });
            return;
          }
        }
      }

      let displayHP = currentRole === 'car' ? localPlayer.hp : remotePlayer.hp;
      document.getElementById('hp-bar-node').style.width = `${displayHP}%`;
      document.getElementById('speed-indicator').innerText = `${Math.floor(Math.abs(localPlayer.speed) * 15)} KM/H`;
      let gear = 'N';
      if(localPlayer.speed > 0.5 && localPlayer.speed <= 3) gear='1';
      else if(localPlayer.speed <= 6) gear='2';
      else if(localPlayer.speed <= 9) gear='3';
      else if(localPlayer.speed > 9) gear='4';
      else if(localPlayer.speed < -0.5) gear='R';
      document.getElementById('gear-indicator').innerText = gear;

      // DRAW LOCAL PLAYER CAR
      ctx.save(); ctx.translate(localPlayer.worldX + cameraViewTranslate.x, localPlayer.worldY + cameraViewTranslate.y);
      ctx.rotate(localPlayer.headingAngle + Math.PI / 2);
      ctx.fillStyle = currentRole === 'car' ? "#ff6a00" : "#ffffff";
      ctx.fillRect(-localPlayer.width / 2, -localPlayer.height / 2, localPlayer.width, localPlayer.height);
      if(currentRole === 'police') {
        ctx.fillStyle = Math.floor(globalFrameClock / 3) % 2 === 0 ? "#00f3ff" : "#ff0000";
        ctx.fillRect(-12, -4, 24, 6); 
      }
      ctx.restore();

      // DRAW REMOTE PLAYER CAR
      ctx.save(); ctx.translate(remotePlayer.worldX + cameraViewTranslate.x, remotePlayer.worldY + cameraViewTranslate.y);
      ctx.rotate(remotePlayer.headingAngle + Math.PI / 2);
      ctx.fillStyle = currentRole === 'car' ? "#ffffff" : "#ff6a00";
      ctx.fillRect(-remotePlayer.width / 2, -remotePlayer.height / 2, remotePlayer.width, remotePlayer.height);
      if(currentRole === 'car') {
        ctx.fillStyle = Math.floor(globalFrameClock / 3) % 2 === 0 ? "#00f3ff" : "#ff0000";
        ctx.fillRect(-12, -4, 24, 6);
      }
      ctx.restore();

      // 📡 MUTUAL RADAR SIGNAL INDICATORS ENGINE
      let rX = remotePlayer.worldX + cameraViewTranslate.x;
      let rY = remotePlayer.worldY + cameraViewTranslate.y;

      if (!(rX > 0 && rX < canvas.width && rY > 0 && rY < canvas.height)) {
        let padding = 30;
        let indicatorX = Math.max(padding, Math.min(canvas.width - padding, rX));
        let indicatorY = Math.max(padding, Math.min(canvas.height - padding, rY));

        ctx.fillStyle = currentRole === 'car' ? "#00f3ff" : "#ff7300";
        ctx.beginPath(); ctx.arc(indicatorX, indicatorY, 15, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(currentRole === 'car' ? "🚨" : "🏎️", indicatorX, indicatorY);
      }

      // ANIMATIONS PIPELINES
      for(let b = explosionBlastsPool.length - 1; b >= 0; b--) {
        let blast = explosionBlastsPool[b]; blast.radius += 3.0; blast.alpha -= 0.03;
        ctx.strokeStyle = `rgba(255, 69, 0, ${blast.alpha})`; ctx.lineWidth = 5;
        ctx.fillStyle = `rgba(255, 140, 0, ${blast.alpha * 0.3})`;
        ctx.beginPath(); ctx.arc(blast.x + cameraViewTranslate.x, blast.y + cameraViewTranslate.y, blast.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        if (blast.alpha <= 0) explosionBlastsPool.splice(b, 1);
      }

      for (let s = impactCrashSparks.length - 1; s >= 0; s--) {
        let spark = impactCrashSparks[s]; spark.x += spark.velX; spark.y += spark.velY; spark.alpha -= 0.03;
        ctx.fillStyle = spark.color; ctx.fillRect(spark.x + cameraViewTranslate.x, spark.y + cameraViewTranslate.y, 6, 6);
        if (spark.alpha <= 0) impactCrashSparks.splice(s, 1);
      }

      requestAnimationFrame(executeRenderingLoopPipeline);
    }
  </script>
</body>
</html>
