<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Box Duel: PRO Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root { --gta-orange: #ff7300; --wasted-red: #d90429; --hud-dark: rgba(10, 12, 24, 0.95); --neon-cyan: #00f3ff; --gas-green: #38b000; --rev-red: #ef4444; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #06070c; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; touch-action: none; color: #fff; }
    #simulationCanvas { display: none; width: 100%; height: 100%; }
    #lobby-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #090b14 0%, #030408 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .lobby-box { background: var(--hud-dark); border: 2px solid var(--gta-orange); padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 115, 0, 0.2); max-width: 400px; width: 100%; text-align: center; }
    .action-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; background: var(--gta-orange); color: #fff; }
    .action-btn.secondary { background: #1e293b; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
    .hud-touch-node { width: 72px; height: 72px; background: var(--hud-dark); border: 2px solid var(--gta-orange); border-radius: 18px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; cursor: pointer; }
    #btn-voice-chat { background: #4a00ff; border-color: #7b2cbf; }
    .combat-action-deck { position: absolute; bottom: 35px; right: 20px; z-index: 15; display: flex; gap: 20px; align-items: flex-end; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="lobby-panel">
    <div class="lobby-box">
      <h2>Cyber Box Duel</h2>
      <div id="connection-controls">
        <button class="action-btn" onclick="initiateHostingRoom()">Create Room ID</button>
        <input type="text" id="room-id-input" placeholder="Enter Room ID Here...">
        <button class="action-btn secondary" onclick="joinTargetRoom()">Connect Room</button>
      </div>
      <div id="status-display">Waiting for action...</div>
    </div>
  </div>

  <canvas id="simulationCanvas"></canvas>

  <div class="combat-action-deck" id="hardware-joysticks" style="display:none;">
    <div class="hud-touch-node" id="btn-voice-chat">🎙️</div>
    <div class="hud-touch-node" id="btn-gas-pedal">GAS</div>
  </div>

  <script>
    let peerConnection, dataChannelConnection, localStream;
    const canvas = document.getElementById('simulationCanvas');

    // Voice Chat & Mic Setup
    async function setupAudio() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Answer incoming calls
        peerConnection.on('call', (call) => {
          call.answer(localStream);
          call.on('stream', (remoteStream) => {
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
          });
        });
      } catch (err) { alert("Mic access denied!"); }
    }

    // Trigger Voice Call
    document.getElementById('btn-voice-chat').onclick = () => {
      const targetId = document.getElementById('room-id-input').value;
      const call = peerConnection.call(targetId, localStream);
      call.on('stream', (remoteStream) => {
        const audio = new Audio();
        audio.srcObject = remoteStream;
        audio.play();
      });
    };

    function initiateHostingRoom() {
      const id = Math.floor(1000 + Math.random() * 9000).toString();
      document.getElementById('room-id-input').value = id;
      peerConnection = new Peer(id);
      setupAudio();
      peerConnection.on('connection', (conn) => { dataChannelConnection = conn; });
    }

    function joinTargetRoom() {
      const id = document.getElementById('room-id-input').value;
      peerConnection = new Peer();
      setupAudio();
      peerConnection.on('open', () => {
        dataChannelConnection = peerConnection.connect(id);
      });
    }

    // (Add your existing game rendering loop logic here after the lobby hides)
    function triggerMatchLaunch() {
       document.getElementById('lobby-panel').style.display = 'none';
       document.getElementById('simulationCanvas').style.display = 'block';
       document.getElementById('hardware-joysticks').style.display = 'flex';
       // Add rendering pipeline call...
    }
  </script>
</body>
</html>
